<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理員登入 — 校園共享雨傘</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: linear-gradient(135deg, #1a3c5e 0%, #2980b9 100%); min-height: 100vh; }
    .login-card { max-width: 400px; border-radius: 1rem; }
    .umbrella-icon { font-size: 3rem; color: #2980b9; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="card shadow-lg p-4 login-card w-100 mx-3">
    <div class="text-center mb-3">
      <i class="bi bi-umbrella-fill umbrella-icon"></i>
      <h4 class="mt-2 fw-bold">校園共享雨傘</h4>
      <p class="text-muted small">管理後台</p>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">管理員密碼</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control" placeholder="請輸入密碼" autofocus required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold">登入</button>
    </form>
  </div>
</body>
</html>
